<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StackMate — My Profile</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .profile-hero {
      background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(139,92,246,0.06));
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      margin-bottom: 2rem;
      position: relative; overflow: hidden;
    }
    .profile-hero::before {
      content: '';
      position: absolute; top: -50px; right: -50px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.12), transparent 70%);
    }
    .profile-top { display: flex; align-items: flex-start; gap: 1.5rem; flex-wrap: wrap; }
    .profile-meta { flex: 1; }
    .profile-name { font-size: 1.875rem; font-weight: 800; margin-bottom: 0.25rem; }
    .profile-role { font-size: 0.9375rem; color: var(--text-secondary); margin-bottom: 0.75rem; }
    .profile-bio  { font-size: 0.9375rem; color: var(--text-secondary); line-height: 1.6; max-width: 500px; }
    .profile-badges { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .profile-actions { display: flex; gap: 0.75rem; flex-shrink: 0; }

    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
    .info-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
    .info-card h3 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 1rem; }
    .info-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.9rem; }
    .info-row:last-child { border-bottom: none; }
    .info-row-label { color: var(--text-secondary); }
    .info-row-value { font-weight: 600; color: var(--text-primary); text-align: right; max-width: 200px; word-break: break-word; }

    .skills-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .skills-section h3 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 1rem; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    /* Edit Modal form */
    .edit-form { display: flex; flex-direction: column; gap: 1.125rem; }
    .edit-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    @media (max-width: 768px) {
      .info-grid { grid-template-columns: 1fr; }
      .profile-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="mesh-bg"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="logo-icon">⚡</div>
      StackMate
    </a>
    <div class="navbar-links">
      <a href="dashboard.html">Discover</a>
      <a href="profile.html" class="active">Profile</a>
    </div>
    <div class="navbar-actions">
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container" style="padding-top:2rem;padding-bottom:4rem;">
      <div id="profile-loading" class="loading-state"><div class="spinner"></div><span>Loading profile...</span></div>
      <div id="profile-content" style="display:none;">

        <!-- Profile Hero -->
        <div class="profile-hero">
          <div class="profile-top">
            <div class="avatar avatar-xl" id="p-avatar"></div>
            <div class="profile-meta">
              <h1 class="profile-name" id="p-name"></h1>
              <p class="profile-role" id="p-role"></p>
              <p class="profile-bio" id="p-bio"></p>
              <div class="profile-badges" id="p-badges"></div>
            </div>
            <div class="profile-actions">
              <button class="btn btn-primary" onclick="openEditModal()">✏️ Edit Profile</button>
              <a href="dashboard.html" class="btn btn-outline">← Back to Matches</a>
            </div>
          </div>
        </div>

        <!-- Info Grid -->
        <div class="info-grid">
          <div class="info-card">
            <h3>Academic Info</h3>
            <div class="info-row"><span class="info-row-label">Program</span><span class="info-row-value" id="p-program">—</span></div>
            <div class="info-row"><span class="info-row-label">Year</span><span class="info-row-value" id="p-year">—</span></div>
            <div class="info-row"><span class="info-row-label">University</span><span class="info-row-value" id="p-university">—</span></div>
          </div>
          <div class="info-card">
            <h3>Work Style</h3>
            <div class="info-row"><span class="info-row-label">Short-term Goal</span><span class="info-row-value" id="p-short-goal">—</span></div>
            <div class="info-row"><span class="info-row-label">Long-term Goal</span><span class="info-row-value" id="p-long-goal">—</span></div>
            <div class="info-row"><span class="info-row-label">Availability</span><span class="info-row-value" id="p-hours">—</span></div>
            <div class="info-row"><span class="info-row-label">Style</span><span class="info-row-value" id="p-style">—</span></div>
          </div>
        </div>

        <!-- Skills -->
        <div class="skills-section">
          <h3>Skills I Have</h3>
          <div class="tags-row" id="p-skills"></div>
        </div>
        <div class="skills-section">
          <h3>Currently Learning</h3>
          <div class="tags-row" id="p-learning"></div>
        </div>
        <div class="skills-section">
          <h3>Project Interests</h3>
          <div class="tags-row" id="p-interests"></div>
        </div>
      </div><!-- /profile-content -->
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal" style="display:none;" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Edit Profile</h2>
        <button class="modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <div class="edit-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" type="text" id="edit-name" placeholder="Your full name"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Program</label>
            <input class="form-input" type="text" id="edit-program" placeholder="e.g. B.Tech CSE"/>
          </div>
          <div class="form-group">
            <label class="form-label">Year</label>
            <select class="form-select" id="edit-year">
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3">3rd Year</option>
              <option value="4">4th Year</option>
              <option value="5">5th Year+</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">University</label>
          <input class="form-input" type="text" id="edit-university" placeholder="University / College"/>
        </div>
        <div class="form-group">
          <label class="form-label">Hours per week</label>
          <input class="form-input" type="number" id="edit-hours" min="1" max="40" placeholder="e.g. 10"/>
        </div>
        <div class="form-group">
          <label class="form-label">Bio</label>
          <textarea class="form-input form-textarea" id="edit-bio" placeholder="Short bio about yourself..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Skills I Have <span style="color:var(--text-muted);font-weight:400;font-size:0.8125rem;">(comma separated)</span></label>
          <input class="form-input" type="text" id="edit-skills" placeholder="e.g. React, Node.js, Python"/>
        </div>
        <div class="form-group">
          <label class="form-label">Currently Learning <span style="color:var(--text-muted);font-weight:400;font-size:0.8125rem;">(comma separated)</span></label>
          <input class="form-input" type="text" id="edit-learning" placeholder="e.g. Machine Learning, Flutter"/>
        </div>
        <div id="edit-error" class="form-error"></div>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
          <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
          <button class="btn btn-primary" id="save-btn" onclick="saveProfile()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/profile.js"></script>
</body>
</html>
