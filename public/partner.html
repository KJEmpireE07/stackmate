<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StackMate — Partner Profile</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .partner-hero {
      background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(6,182,212,0.06));
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      margin-bottom: 2rem;
    }
    .partner-top { display: flex; align-items: flex-start; gap: 1.5rem; flex-wrap: wrap; }
    .partner-meta { flex: 1; }
    .partner-name { font-size: 1.875rem; font-weight: 800; margin-bottom: 0.25rem; }
    .partner-role { font-size: 0.9375rem; color: var(--text-secondary); margin-bottom: 0.75rem; }
    .partner-bio  { font-size: 0.9375rem; color: var(--text-secondary); line-height: 1.6; max-width: 500px; }
    .partner-right { display: flex; flex-direction: column; align-items: center; gap: 1rem; }

    .match-breakdown-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .match-breakdown-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem; }

    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
    .info-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
    .info-card h3 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 1rem; }
    .info-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.9rem; }
    .info-row:last-child { border-bottom: none; }
    .info-row-label { color: var(--text-secondary); }
    .info-row-value { font-weight: 600; color: var(--text-primary); text-align: right; max-width: 200px; word-break: break-word; }
    .skills-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .skills-section h3 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 1rem; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    @media (max-width: 768px) { .info-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="mesh-bg"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="logo-icon">⚡</div>
      StackMate
    </a>
    <div class="navbar-links">
      <a href="dashboard.html">Discover</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="navbar-actions">
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container" style="padding-top:2rem;padding-bottom:4rem;">
      <a href="dashboard.html" class="btn btn-outline btn-sm" style="margin-bottom:1.5rem;display:inline-flex;">← Back to Matches</a>

      <div id="partner-loading" class="loading-state"><div class="spinner"></div><span>Loading profile...</span></div>
      <div id="partner-content" style="display:none;">

        <!-- Partner Hero -->
        <div class="partner-hero">
          <div class="partner-top">
            <div class="avatar avatar-xl" id="pp-avatar"></div>
            <div class="partner-meta">
              <h1 class="partner-name" id="pp-name"></h1>
              <p class="partner-role" id="pp-role"></p>
              <p class="partner-bio" id="pp-bio"></p>
              <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:1rem;" id="pp-badges"></div>
            </div>
            <div class="partner-right">
              <!-- Score Ring -->
              <div class="score-ring-wrap">
                <svg class="score-ring" width="100" height="100" viewBox="0 0 100 100">
                  <circle class="score-ring-bg" cx="50" cy="50" r="42" stroke-width="6"/>
                  <circle class="score-ring-fill" id="pp-ring" cx="50" cy="50" r="42" stroke-width="6"
                    stroke-dasharray="263.9"
                    stroke-dashoffset="263.9"/>
                </svg>
                <div class="score-ring-text">
                  <span class="score-ring-number" id="pp-score">—</span>
                  <span class="score-ring-label">match</span>
                </div>
              </div>
              <button class="btn btn-primary" id="connect-btn" onclick="sendConnect()">
                Connect →
              </button>
            </div>
          </div>
        </div>

        <!-- Match Breakdown -->
        <div class="match-breakdown-card" id="breakdown-card" style="display:none;">
          <h3>📊 Why You Match</h3>
          <div id="pp-breakdown"></div>
        </div>

        <!-- Info Grid -->
        <div class="info-grid">
          <div class="info-card">
            <h3>Academic Info</h3>
            <div class="info-row"><span class="info-row-label">Program</span><span class="info-row-value" id="pp-program">—</span></div>
            <div class="info-row"><span class="info-row-label">Year</span><span class="info-row-value" id="pp-year">—</span></div>
            <div class="info-row"><span class="info-row-label">University</span><span class="info-row-value" id="pp-university">—</span></div>
          </div>
          <div class="info-card">
            <h3>Goals & Work Style</h3>
            <div class="info-row"><span class="info-row-label">Short-term</span><span class="info-row-value" id="pp-short-goal">—</span></div>
            <div class="info-row"><span class="info-row-label">Long-term</span><span class="info-row-value" id="pp-long-goal">—</span></div>
            <div class="info-row"><span class="info-row-label">Availability</span><span class="info-row-value" id="pp-hours">—</span></div>
            <div class="info-row"><span class="info-row-label">Style</span><span class="info-row-value" id="pp-style">—</span></div>
          </div>
        </div>

        <!-- Skills -->
        <div class="skills-section">
          <h3>Their Skills</h3>
          <div class="tags-row" id="pp-skills"></div>
        </div>
        <div class="skills-section">
          <h3>Currently Learning</h3>
          <div class="tags-row" id="pp-learning"></div>
        </div>
        <div class="skills-section">
          <h3>Project Interests</h3>
          <div class="tags-row" id="pp-interests"></div>
        </div>

      </div><!-- /partner-content -->
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/partner.js"></script>
</body>
</html>
